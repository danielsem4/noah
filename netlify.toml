[build]
  command   = "npm run build"
  publish   = "dist"

# Immutable cache for Vite-hashed assets (JS, CSS, images)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Immutable cache for self-hosted font files
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML must revalidate on every visit
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback — serve index.html for all unmatched routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
